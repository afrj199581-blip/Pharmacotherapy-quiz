          correct: 0, hint: "CA inhibitors cause renal stones.", explanation: "Topiramate's carbonic anhydrase inhibition increases kidney stone risk." },
        { module: "Antiepileptics", question: "Oligohydrosis (decreased sweating) and hyperthermia are risks with Topiramate, especially in:",
          options: ["Elderly", "Children", "Pregnant women", "Smokers"],
          correct: 1, hint: "Children are more susceptible.", explanation: "Topiramate can cause oligohydrosis and hyperthermia, especially in children." },
        { module: "Antiepileptics", question: "Zonisamide is chemically classified as a:",
          options: ["Barbiturate", "Sulfonamide derivative", "Hydantoin", "Benzodiazepine"],
          correct: 1, hint: "It contains sulfur.", explanation: "Zonisamide is a sulfonamide derivative." },
        { module: "Antiepileptics", question: "Vagus Nerve Stimulation (VNS) is indicated for patients who are:",
          options: ["Newly diagnosed", "Refractory to multiple therapies", "Pregnant", "Elderly only"],
          correct: 1, hint: "For difficult-to-treat cases.", explanation: "VNS is used for patients refractory to multiple drug therapies." },
        // New High-Yield Antiepileptics Qs
        { module: "Antiepileptics", question: "What is the drug of choice for trigeminal neuralgia, which also acts as an AED?",
          options: ["Phenytoin", "Carbamazepine", "Valproate", "Gabapentin"],
          correct: 1, hint: "It is first-line for partial seizures.", explanation: "Carbamazepine is the drug of choice for trigeminal neuralgia." },
        { module: "Antiepileptics", question: "Which AED is a broad-spectrum agent effective in both focal and generalized seizures?",
          options: ["Ethosuximide", "Valproate", "Carbamazepine", "Phenytoin"],
          correct: 1, hint: "It works on multiple mechanisms.", explanation: "Valproate is effective against all seizure types." },
        { module: "Antiepileptics", question: "Which AED is contraindicated in pregnancy due to the risk of spina bifida?",
          options: ["Lamotrigine", "Valproate", "Levetiracetam", "Gabapentin"],
          correct: 1, hint: "It is a folate antagonist.", explanation: "Valproate is teratogenic, causing neural tube defects like spina bifida." },
        { module: "Antiepileptics", question: "Which AED is associated with gingival hyperplasia?",
          options: ["Carbamazepine", "Phenytoin", "Valproate", "Ethosuximide"],
          correct: 1, hint: "It causes gum overgrowth.", explanation: "Phenytoin commonly causes gingival hyperplasia, especially in children." },
        { module: "Antiepileptics", question: "Which AED is associated with hyponatremia?",
          options: ["Phenytoin", "Carbamazepine", "Valproate", "Gabapentin"],
          correct: 1, hint: "It affects ADH.", explanation: "Carbamazepine and oxcarbazepine can cause hyponatremia." },
        { module: "Antiepileptics", question: "Which AED is associated with weight loss?",
          options: ["Valproate", "Carbamazepine", "Topiramate", "Gabapentin"],
          correct: 2, hint: "It also causes kidney stones.", explanation: "Topiramate is associated with weight loss." },
        { module: "Antiepileptics", question: "Which AED is a hepatic enzyme inducer?",
          options: ["Valproate", "Carbamazepine", "Ethosuximide", "Levetiracetam"],
          correct: 1, hint: "It speeds up metabolism.", explanation: "Carbamazepine induces CYP450 enzymes." },
        { module: "Antiepileptics", question: "Which AED is a hepatic enzyme inhibitor?",
          options: ["Phenytoin", "Carbamazepine", "Valproate", "Phenobarbital"],
          correct: 2, hint: "It slows down metabolism.", explanation: "Valproate inhibits CYP450 enzymes, causing drug interactions." },
        { module: "Antiepileptics", question: "Which AED is structurally an analogue of GABA?",
          options: ["Topiramate", "Gabapentin", "Lamotrigine", "Phenytoin"],
          correct: 1, hint: "Its name contains GABA.", explanation: "Gabapentin is a GABA analogue." },
        { module: "Antiepileptics", question: "Which AED binds to SV2A (synaptic vesicle protein 2A)?",
          options: ["Lamotrigine", "Levetiracetam", "Topiramate", "Pregabalin"],
          correct: 1, hint: "It is known for few interactions.", explanation: "Levetiracetam binds to SV2A, modulating neurotransmitter release." },
        { module: "Antiepileptics", question: "What is the first-line IV treatment for status epilepticus?",
          options: ["Phenytoin", "Carbamazepine", "Diazepam or Lorazepam", "Valproate"],
          correct: 2, hint: "Benzodiazepines are fast-acting.", explanation: "IV diazepam or lorazepam is first-line for status epilepticus." },
        { module: "Antiepileptics", question: "Why must AEDs not be stopped abruptly?",
          options: ["It causes sedation", "It can precipitate status epilepticus", "It causes weight gain", "It increases drug levels"],
          correct: 1, hint: "Rebound seizures are dangerous.", explanation: "Abrupt withdrawal can precipitate status epilepticus, especially with tonic-clonic seizures." },
        { module: "Antiepileptics", question: "Felbamate is reserved for refractory epilepsy because of:",
          options: ["Weight gain", "Aplastic anemia and hepatic failure", "Gingival hyperplasia", "Hyponatremia"],
          correct: 1, hint: "It has serious toxicity.", explanation: "Felbamate carries a high risk of aplastic anemia and liver failure." },
        { module: "Antiepileptics", question: "Which AED is used for neuropathic pain and epilepsy?",
          options: ["Phenytoin", "Gabapentin", "Ethosuximide", "Carbamazepine"],
          correct: 1, hint: "It is a GABA analogue.", explanation: "Gabapentin is used for epilepsy and neuropathic pain." },
        { module: "Antiepileptics", question: "Which AED is a carbonic anhydrase inhibitor?",
          options: ["Valproate", "Topiramate", "Lamotrigine", "Levetiracetam"],
          correct: 1, hint: "It can cause kidney stones.", explanation: "Topiramate inhibits carbonic anhydrase, increasing kidney stone risk." },
        { module: "Antiepileptics", question: "Which AED is associated with osteoporosis due to vitamin D metabolism interference?",
          options: ["Gabapentin", "Phenytoin", "Levetiracetam", "Ethosuximide"],
          correct: 1, hint: "It affects calcium.", explanation: "Phenytoin and phenobarbital interfere with vitamin D metabolism, leading to osteoporosis." },
        { module: "Antiepileptics", question: "Which AED is recommended as first-line for focal (partial) seizures?",
          options: ["Ethosuximide", "Carbamazepine", "Valproate", "Phenobarbital"],
          correct: 1, hint: "It is also used for neuralgia.", explanation: "Carbamazepine is first-line for focal seizures." },
        { module: "Antiepileptics", question: "Oxcarbazepine is a prodrug that is converted to:",
          options: ["Carbamazepine", "MHD (monohydroxy derivative)", "Phenytoin", "Valproate"],
          correct: 1, hint: "It is a derivative of carbamazepine.", explanation: "Oxcarbazepine is converted to the active monohydroxy derivative (MHD)." },
        { module: "Antiepileptics", question: "Which AED is known for having zero-order pharmacokinetics at high doses?",
          options: ["Carbamazepine", "Valproate", "Phenytoin", "Lamotrigine"],
          correct: 2, hint: "Metabolic pathway saturates.", explanation: "Phenytoin exhibits zero-order kinetics at high doses; small dose increases cause large toxicity." },
        { module: "Antiepileptics", question: "Which AED is effective for both epilepsy and migraine prophylaxis?",
          options: ["Carbamazepine", "Valproate", "Topiramate", "Ethosuximide"],
          correct: 2, hint: "It has multiple mechanisms.", explanation: "Topiramate is effective for epilepsy and migraine prophylaxis." },
        { module: "Antiepileptics", question: "Which AED is used to treat Lennox-Gastaut syndrome?",
          options: ["Carbamazepine", "Valproate", "Lamotrigine", "Ethosuximide"],
          correct: 2, hint: "It is a broad-spectrum drug.", explanation: "Lamotrigine is used for Lennox-Gastaut syndrome." },
        { module: "Antiepileptics", question: "Which AED is commonly associated with Stevens-Johnson syndrome?",
          options: ["Valproate", "Carbamazepine", "Gabapentin", "Levetiracetam"],
          correct: 1, hint: "It causes severe rash.", explanation: "Carbamazepine and lamotrigine are associated with Stevens-Johnson syndrome." },
        { module: "Antiepileptics", question: "What is the mechanism of action of benzodiazepines in epilepsy?",
          options: ["Block Na+ channels", "Enhance GABA action by increasing Cl- channel opening frequency", "Inhibit T-type Ca++ channels", "Block glutamate receptors"],
          correct: 1, hint: "They work on GABA-A receptors.", explanation: "Benzodiazepines increase the frequency of Cl- channel opening." },
        { module: "Antiepileptics", question: "What is the mechanism of action of phenobarbital?",
          options: ["Increase frequency of Cl- opening", "Increase duration of Cl- opening", "Block Na+ channels", "Block Ca++ channels"],
          correct: 1, hint: "Barbiturates prolong channel opening.", explanation: "Phenobarbital increases the duration of Cl- channel opening." }
    ];

    // -------- QUIZ ENGINE --------
    const app = {
        currentIndex: 0,
        total: questions.length,
        answers: new Array(questions.length).fill(null),
        answered: new Array(questions.length).fill(false),
        score: 0,
        finished: false
    };

    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const hintBox = document.getElementById('hintBox');
    const counter = document.getElementById('counter');
    const progressFill = document.getElementById('progressFill');
    const moduleTag = document.getElementById('moduleTag');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const checkBtn = document.getElementById('checkBtn');
    const hintBtn = document.getElementById('hintBtn');
    const scoreSummary = document.getElementById('scoreSummary');
    const finalScore = document.getElementById('finalScore');
    const finalDetails = document.getElementById('finalDetails');
    const restartBtn = document.getElementById('restartBtn');

    function renderQuestion() {
        const q = questions[app.currentIndex];
        const idx = app.currentIndex;

        counter.textContent = `${idx+1} / ${app.total}`;
        progressFill.style.width = `${((idx+1)/app.total)*100}%`;
        moduleTag.textContent = q.module;

        questionText.textContent = q.question;

        optionsContainer.innerHTML = '';
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.textContent = `${String.fromCharCode(65+i)}. ${opt}`;
            div.dataset.index = i;
            div.addEventListener('click', () => selectOption(i));
            if (app.answered[idx] && i === app.answers[idx]) {
                div.classList.add('selected-correct');
                div.classList.add('disabled');
            }
            if (app.answered[idx] && app.answers[idx] !== q.correct && i === q.correct) {
                div.classList.add('show-correct');
                div.classList.add('disabled');
            }
            if (app.answered[idx] && i === app.answers[idx] && i !== q.correct) {
                div.classList.add('selected-wrong');
                div.classList.add('disabled');
            }
            if (app.answered[idx]) {
                div.classList.add('disabled');
            }
            optionsContainer.appendChild(div);
        });

        if (app.answered[idx]) {
            const isCorrect = app.answers[idx] === q.correct;
            feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            feedback.textContent = isCorrect ? '✅ Correct! ' + q.explanation : '❌ Wrong. ' + q.explanation;
            feedback.style.display = 'block';
        } else {
            feedback.style.display = 'none';
        }

        if (app.answered[idx]) {
            hintBox.className = 'hint-box show';
            hintBox.textContent = '💡 ' + q.hint;
        } else {
            hintBox.className = 'hint-box';
            hintBox.textContent = '';
        }

        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx === app.total - 1;
        checkBtn.disabled = app.answered[idx];
        hintBtn.disabled = app.answered[idx];
    }

    function selectOption(selected) {
        const idx = app.currentIndex;
        if (app.answered[idx]) return;

        const q = questions[idx];
        const options = document.querySelectorAll('.option');
        options.forEach((el, i) => {
            if (i === selected) el.classList.add('selected-correct');
            if (i === q.correct) el.classList.add('show-correct');
            el.classList.add('disabled');
        });

        app.answered[idx] = true;
        app.answers[idx] = selected;

        const isCorrect = selected === q.correct;
        if (isCorrect) app.score++;

        feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
        feedback.textContent = isCorrect ? '✅ Correct! ' + q.explanation : '❌ Wrong. ' + q.explanation;
        feedback.style.display = 'block';

        hintBox.className = 'hint-box show';
        hintBox.textContent = '💡 ' + q.hint;

        checkBtn.disabled = true;
        hintBtn.disabled = true;

        const answeredCount = app.answered.filter(v => v).length;
        progressFill.style.width = `${(answeredCount/app.total)*100}%`;

        if (answeredCount === app.total) {
            setTimeout(showSummary, 1200);
        }
    }

    function showSummary() {
        app.finished = true;
        document.getElementById('questionArea').classList.add('hidden');
        document.querySelector('.actions').classList.add('hidden');
        scoreSummary.classList.remove('hidden');
        const pct = Math.round((app.score / app.total) * 100);
        finalScore.textContent = pct + '%';
        finalDetails.textContent = `${app.score} correct out of ${app.total}`;
        document.querySelector('.progress-section').style.display = 'none';
    }

    function goTo(index) {
        if (index < 0 || index >= app.total) return;
        app.currentIndex = index;
        renderQuestion();
    }

    function restartQuiz() {
        app.currentIndex = 0;
        app.answers = new Array(app.total).fill(null);
        app.answered = new Array(app.total).fill(false);
        app.score = 0;
        app.finished = false;
        document.getElementById('questionArea').classList.remove('hidden');
        document.querySelector('.actions').classList.remove('hidden');
        scoreSummary.classList.add('hidden');
        document.querySelector('.progress-section').style.display = 'flex';
        renderQuestion();
    }

    prevBtn.addEventListener('click', () => goTo(app.currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(app.currentIndex + 1));
    hintBtn.addEventListener('click', () => {
        const idx = app.currentIndex;
        if (!app.answered[idx]) {
            const q = questions[idx];
            hintBox.className = 'hint-box show';
            hintBox.textContent = '💡 ' + q.hint;
        }
    });
    restartBtn.addEventListener('click', restartQuiz);

    document.addEventListener('keydown', (e) => {
        if (app.finished) return;
        if (e.key === 'ArrowLeft') goTo(app.currentIndex - 1);
        if (e.key === 'ArrowRight') goTo(app.currentIndex + 1);
        if (e.key >= '1' && e.key <= '4') {
            const idx = parseInt(e.key) - 1;
            const options = document.querySelectorAll('.option');
            if (options[idx] && !app.answered[app.currentIndex]) {
                selectOption(idx);
            }
        }
    });

    renderQuestion();
</script>
