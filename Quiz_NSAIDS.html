teric modulation", "D) Receptor downregulation"], "correct": 1, "hint": "الأسبرين يدمر الإنزيم للأبد (Irreversible)، ولهذا مفعوله المانع للتجلط يستمر طويلاً."}, {"q": "How long does the antiplatelet effect of Aspirin last?", "options": ["A) 6 hours", "B) 24 hours", "C) 7-10 days (lifetime of platelet)", "D) 1 month"], "correct": 2, "hint": "الصفائح الدموية لا تملك أنوية لتصنيع إنزيم جديد، فيستمر المفعول حتى تموت الصفيحة."}, {"q": "Aspirin is contraindicated in children with viral infections to prevent:", "options": ["A) Asthma", "B) Reye's Syndrome", "C) Aplastic Anemia", "D) Gastric ulcers"], "correct": 1, "hint": "متلازمة راي تسبب فشلاً كبدياً وتورماً في الدماغ وهي قاتلة."}, {"q": "Acetaminophen lacks significant anti-inflammatory action because:", "options": ["A) It blocks COX-1 only", "B) It is inactivated by peroxides in inflamed tissues", "C) It is excreted immediately", "D) It cannot cross cell membranes"], "correct": 1, "hint": "يعمل مركزياً في المخ، لكنه يفشل في الأطراف الملتهبة بسبب وجود البيروكسيدات."}, {"q": "Severe Acetaminophen overdose causes toxic accumulation of:", "options": ["A) Salicylic acid", "B) NAPQI", "C) Arachidonic acid", "D) Glutathione"], "correct": 1, "hint": "NAPQI هو الميتابوليت السام الذي يدمر الكبد إذا انتهى مخزون الجلوتاثيون."}, {"q": "The specific antidote for Acetaminophen toxicity is:", "options": ["A) Naloxone", "B) N-acetylcysteine (NAC)", "C) Flumazenil", "D) Atropine"], "correct": 1, "hint": "يوفر الـ NAC مجموعة السلفهيدريل لتجديد الجلوتاثيون وحماية الكبد."}, {"q": "Diflunisal does NOT reduce fever because:", "options": ["A) It is destroyed by stomach acid", "B) It cannot cross the Blood-Brain Barrier (BBB)", "C) It is a pro-drug", "D) It only inhibits LOX"], "correct": 1, "hint": "لأنه لا يعبر للمخ، لا يمكنه الوصول لمركز تنظيم الحرارة في الهايبوثلامس."}, {"q": "NSAIDs reduce fever by inhibiting PGE2 synthesis in the:", "options": ["A) Pituitary", "B) Hypothalamus thermoregulatory center", "C) Thalamus", "D) Medulla"], "corr             progressText.innerText = `السؤال ${currentQuestionIndex + 1} من ${questionsData.length}`;
            questionTextElement.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.q}`;
            
            hintBox.innerHTML = `<strong>💡 تلميح:</strong> ${currentQ.hint}`;

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn, currentQ.correct);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, btnElement, correctIndex) {
            if (answered) return;
            answered = true;
            
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);
            
            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }
            
            hintBtn.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function showHint() {
            hintBox.style.display = 'block';
            hintBtn.style.display = 'none';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizBox.style.display = 'none';
            resultBox.style.display = 'block';
            scoreText.innerText = score;
        }

        // بدء الاختبار
        loadQuestion();
    </script>
</body>
</html>
