losteric modulation", "D) Receptor downregulation"], "correct": 1, "hint": "الأسبرين يدمر الإنزيم للأبد (Irreversible)، ولهذا مفعوله المانع للتجلط يستمر طويلاً."}, {"q": "How long does the antiplatelet effect of Aspirin last?", "options": ["A) 6 hours", "B) 24 hours", "C) 7-10 days (lifetime of platelet)", "D) 1 month"], "correct": 2, "hint": "الصفائح لا تملك أنوية لتصنيع إنزيم جديد، فيستمر المفعول حتى تموت الصفيحة."}, {"q": "Aspirin is contraindicated in children with viral infections to prevent:", "options": ["A) Asthma", "B) Reye's Syndrome", "C) Aplastic Anemia", "D) Gastric ulcers"], "correct": 1, "hint": "متلازمة راي تسبب فشلاً كبدياً وتورماً في الدماغ وهي قاتلة."}, {"q": "Acetaminophen lacks significant anti-inflammatory action because:", "options": ["A) It blocks COX-1 only", "B) It is inactivated by peroxides in inflamed tissues", "C) It is excreted immediately", "D) It cannot cross cell membranes"], "correct": 1, "hint": "يعمل مركزياً في المخ، لكنه يفشل في الأطراف الملتهبة بسبب وجود البيروكسيدات."}, {"q": "Severe Acetaminophen overdose causes toxic accumulation of:", "options": ["A) Salicylic acid", "B) NAPQI", "C) Arachidonic acid", "D) Glutathione"], "correct": 1, "hint": "NAPQI هو الميتابوليت السام الذي يدمر الكبد إذا انتهى مخزون الجلوتاثيون."}, {"q": "The specific antidote for Acetaminophen toxicity is:", "options": ["A) Naloxone", "B) N-acetylcysteine (NAC)", "C) Flumazenil", "D) Atropine"], "correct": 1, "hint": "يوفر الـ NAC مجموعة السلفهيدريل لتجديد الجلوتاثيون وحماية الكبد."}, {"q": "Diflunisal does NOT reduce fever because:", "options": ["A) It is destroyed by stomach acid", "B) It cannot cross the Blood-Brain Barrier (BBB)", "C) It is a pro-drug", "D) It only inhibits LOX"], "correct": 1, "hint": "لأنه لا يعبر للمخ، لا يمكنه الوصول لمركز تنظيم الحرارة في الهايبوثلامس."}, {"q": "NSAIDs reduce fever by inhibiting PGE2 synthesis in the:", "options": ["A) Pituitary", "B) Hypothalamus thermoregulatory center", "C) Thalamus", "D) Medulla"], "correct": 1, "hint": "PGE2 هو الذي يرفع 'ترموستات' الجسم، وإيقافه يعيد الحرارة لطبيعتها."}, {"q": "Misoprostol is specifically used to:", "options": ["A) Cure asthma", "B) Prevent NSAID-induced gastric ulcers", "C) Treat gout", "D) Lower blood pressure"], "correct": 1, "hint": "هو نظير للبروستاجلاندين (PGE1) يعوض النقص الذي تسببه المسكنات لحماية المعدة."}, {"q": "NSAIDs can cause Acute Kidney Injury (AKI) especially in dehydrated patients by:", "options": ["A) Dilating the efferent arteriole", "B) Constricting the afferent arteriole (blocking PG vasodilation)", "C) Destroying nephrons directly", "D) Causing kidney stones"], "correct": 1, "hint": "البروستاجلاندين تحافظ على الشريان الكلوي مفتوحاً، غلقها بالمسكنات يسبب فشلاً كلوياً حاداً."}, {"q": "Toxic doses of Salicylates initially cause which acid-base disturbance?", "options": ["A) Metabolic acidosis", "B) Respiratory alkalosis (due to hyperventilation)", "C) Respiratory acidosis", "D) Metabolic alkalosis"], "correct": 1, "hint": "الأسبرين يحفز مركز التنفس فيجعلك تلهث وتطرد CO2، مما يرفع قلوية الدم تنفسياً."}, {"q": "At very high (toxic) levels, salicylates uncouple oxidative phosphorylation, causing:", "options": ["A) Hypothermia", "B) Severe Hyperthermia (heat dissipation)", "C) Bradycardia", "D) Paralysis"], "correct": 1, "hint": "تدمير مصانع الطاقة بالخلية يحرر الطاقة على شكل حرارة مميتة."}, {"q": "To treat severe Aspirin overdose (Salicylism), the urine should be:", "options": ["A) Acidified", "B) Alkalinized (using Sodium Bicarbonate)", "C) Concentrated", "D) Diluted only"], "correct": 1, "hint": "جعل البول قاعدياً يؤين الأسبرين فيحبسه في البول ويطرده خارج الجسم."}, {"q": "Aspirin competes with and displaces which highly protein-bound drug, increasing bleeding risk?", "options": ["A) Acetaminophen", "B) Warfarin", "C) Penicillin", "D) Omeprazole"], "correct": 1, "hint": "طرد الوارفرين من بروتينات الدم يزيد تركيزه الحر، مما يسبب نزيفاً مميتاً."}, {"q": "Gout is characterized by the deposition of which crystals in the         let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const hintBox = document.getElementById('hint-box');
        const nextBtn = document.getElementById('next-btn');
        const hintBtn = document.getElementById('hint-btn');
        const progressText = document.getElementById('progress-text');
        const quizBox = document.getElementById('quiz-box');
        const resultBox = document.getElementById('result-box');
        const scoreText = document.getElementById('score-text');

        function loadQuestion() {
            answered = false;
            hintBox.style.display = 'none';
            nextBtn.style.display = 'none';
            hintBtn.style.display = 'none';
            optionsContainer.innerHTML = '';
            
            const currentQ = questionsData[currentQuestionIndex];
            progressText.innerText = `السؤال ${currentQuestionIndex + 1} من ${questionsData.length}`;
            questionTextElement.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.q}`;
            
            hintBox.innerHTML = `<strong>💡 تلميح:</strong> ${currentQ.hint}`;

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn, currentQ.correct);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, btnElement, correctIndex) {
            if (answered) return;
            answered = true;
            
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);
            
            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }
            
            hintBtn.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function showHint() {
            hintBox.style.display = 'block';
            hintBtn.style.display = 'none';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizBox.style.display = 'none';
            resultBox.style.display = 'block';
            scoreText.innerText = score;
        }

        // بدء الاختبار
        loadQuestion();
