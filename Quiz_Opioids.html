    <script>
        const questionsData = [{"q": "According to the vascular theory, the visual 'aura' preceding a migraine is caused by:", "options": ["A) Massive vasodilation", "B) Sequential cranial vasoconstriction", "C) Histamine release", "D) Platelet aggregation"], "correct": 1, "hint": "الأورا (مثل زغللة العين) تنتج عن انقباض الأوعية الدموية بالدماغ، يعقبها تمدد وعائي يسبب الألم."}, {"q": "The throbbing, pulsating pain phase of a migraine attack is primarily characterized by:", "options": ["A) Vasoconstriction", "B) Cranial vasodilation", "C) Nerve demyelination", "D) Muscle spasms"], "correct": 1, "hint": "تمدد الأوعية الدموية هو ما يسبب النبض والألم الشديد في الصداع النصفي."}, {"q": "Sumatriptan aborts acute migraine attacks by acting as an agonist at which specific receptors?", "options": ["A) Dopamine D2", "B) Serotonin 5-HT1B/1D", "C) Alpha-1 adrenergic", "D) GABA-A"], "correct": 1, "hint": "أدوية التريبتان تقبض الأوعية الدموية المتمددة عبر تنشيط مستقبلات السيروتونين 5-HT1D."}, {"q": "Triptans are absolutely contraindicated in patients with which of the following conditions?", "options": ["A) Asthma", "B) Ischemic heart disease (Angina/MI)", "C) Peptic ulcers", "D) Renal failure"], "correct": 1, "hint": "نظراً لقدرتها القوية على قبض الأوعية، قد تتسبب في تشنج الشرايين التاجية للمرضى المعرضين لأمراض القلب."}, {"q": "Which of the following is the mechanism of action of Ergotamine in treating acute migraines?", "options": ["A) Direct vasodilation", "B) Non-selective cranial and peripheral vasoconstriction", "C) Blocking serotonin", "D) Inhibiting COX-2"], "correct": 1, "hint": "الإرجوتامين قابض قوي للأوعية الدموية، ولكنه أقل تخصصاً من التريبتان وله آثار جانبية أكثر."}, {"q": "Ergotamine is classified as Pregnancy Category X because it causes:", "options": ["A) Fetal blindness", "B) Severe uterine contractions and potential abortion", "C) Gestational diabetes", "D) Maternal hypotension"], "correct": 1, "hint": "مادة الإرجوتامين تقبض العضلات الملساء، مما يثير انقباضات الرحم ويهدد بإسقاط الجنين."}, {"q": "Propranolol is used effectively for migraine prophylaxis because it:", "options": ["A) Stops acute attacks instantly", "B) Blocks beta-receptors, allowing unopposed alpha-adrenergic activity to prevent vasodilation", "C) Induces sleep", "D) Dilates cranial vessels"], "correct": 1, "hint": "حاصرات بيتا تعمل كوقاية عن طريق منع التمدد الوعائي الذي يسبب الصداع."}, {"q": "Calcium-channel antagonists (like Verapamil) help migraine patients primarily by:", "options": ["A) Curing the disease", "B) Reducing the frequency of attacks", "C) Stopping the pain of an active attack", "D) Increasing cranial blood flow"], "correct": 1, "hint": "تستخدم للوقاية لتقليل عدد مرات حدوث الصداع شهرياً، لكنها لا توقف الهجمة النشطة."}, {"q": "A patient is having a mild, infrequent migraine attack. The recommended first-line treatment is:", "options": ["A) Fentanyl IV", "B) Immediate ingestion of NSAIDs or Acetaminophen", "C) Sumatriptan", "D) Haloperidol"], "correct": 1, "hint": "في الهجمات الخفيفة وفي بدايتها، المسكنات العادية تفي بالغرض تماماً."}, {"q": "Topiramate and Valproic acid are antiepileptic drugs that are also highly effective for:", "options": ["A) Gout prophylaxis", "B) Migraine prophylaxis", "C) Curing schizophrenia", "D) Asthma"], "correct": 1, "hint": "تُستخدم هذه الأدوية بكثرة في الوقاية المستمرة من الصداع النصفي وتقليل الإثارة العصبية."}, {"q": "A patient describes her migraine as 'alternating hemicrania'. What does this mean?", "options": ["A) Painless headache", "B) The headache changes sides (right to left) in different attacks", "C) Bilateral tension", "D) Accompanied by seizures"], "correct": 1, "hint": "الصداع النصفي قد يغير مكانه من النصف الأيمن للأيسر في هجمات مختلفة."}, {"q": "Which mechanism makes Triptans superior to Ergotamine?", "options": ["A) They cause vasodilation", "B) They selectively constrict cranial vessels and inhibit pain peptide release without severe systemic vasoconstriction", "C) They are safe in pregnancy", "D) They have a 1-month half-life"], "correct": 1, "hint": "التريبتان أكثر تخصصاً (Selective) لأوعية الدماغ وأقل إحداثاً للآثار الجانبية الشاملة."}, {"q": "Triptans inhibit the release of pain neurotransmitters from which cranial nerve?", "options": ["A) Vagus nerve", "B) Trigeminal nerve", "C) Optic nerve", "D) Facial nerve"], "correct": 1, "hint": "تمنع العصب الخامس (Trigeminal) من إفراز الببتيدات المسببة للالتهاب والألم."}, {"q": "Which route of administration is preferred for Sumatriptan in a patient with severe migraine-induced vomiting?", "options": ["A) Oral tablet", "B) Subcutaneous injection or nasal spray", "C) Enteric-coated pill", "D) IV infusion"], "correct": 1, "hint": "إذا كان المريض يتقيأ، فالحبوب الفموية لن تفيد، ويُفضل الحقن تحت الجلد أو البخاخ الأنفي."}, {"q": "A side effect of Triptans related to their mechanism of action is:", "options": ["A) Severe diarrhea", "B) Chest tightness and coronary vasospasm", "C) Hypoglycemia", "D) Tremors"], "correct": 1, "hint": "بسبب قبضها للأوعية، قد تسبب شعوراً بضيق في الصدر يجب مراقبته."}, {"q": "Migraine prophylaxis is indicated when attacks occur more frequently than:", "options": ["A) Once a year", "B) 2-3 times per month or if they are severely debilitating", "C) Every 5 years", "D) Only during pregnancy"], "correct": 1, "hint": "لا نلجأ للوقاية المستمرة إلا إذا كان الصداع يعطل حياة المريض بتكراره الشديد."}, {"q": "Amitriptyline is used in migraine management as a:", "options": ["A) Acute abortive agent", "B) Prophylactic agent (Tricyclic antidepressant)", "C) Anti-emetic", "D) Vasodilator"], "correct": 1, "hint": "مضادات الاكتئاب ثلاثية الحلقات فعالة جداً في الوقاية من الصداع النصفي."}, {"q": "The primary goal of abortive therapy in migraines is to:", "options": ["A) Prevent attacks from happening next month", "B) Stop or reverse the progression of an acute attack", "C) Lower blood pressure", "D) Increase heart rate"], "correct": 1, "hint": "العلاج الإجهاضي (Abortive) يهدف لوقف الهجمة الحالية فوراً."}, {"q": "Ergotamine is often combined with caffeine in oral preparations to:", "options": ["A) Induce sleep", "B) Enhance its absorption and vasoconstrictive effect", "C) Prevent tachycardia", "D) Relieve stomach pain"], "correct": 1, "hint": "الكافيين يحسن امتصاص الإرجوتامين ويزيد من قبض الأوعية الدموية."}, {"q": "Overuse of acute migraine medications (like Triptans or analgesics) can lead to:", "options": ["A) Permanent cure", "B) Medication-overuse headaches (Rebound headaches)", "C) Brain tumors", "D) Blindness"], "correct": 1, "hint": "استخدام المسكنات بكثرة يسبب 'صداع ارتدادي' أسوأ من الصداع الأصلي."}, {"q": "Which phase of a migraine attack is characterized by fatigue, yawning, and food cravings before the aura?", "options": ["A) Pain phase", "B) Prodrome phase", "C) Postdrome phase", "D) Resolution"], "correct": 1, "hint": "مرحلة البادرة (Prodrome) تسبق الأورا والصداع بساعات أو أيام."}, {"q": "In migraine pathophysiology, which neuropeptide is heavily implicated in causing neurogenic inflammation?", "options": ["A) Acetylcholine", "B) CGRP (Calcitonin Gene-Related Peptide)", "C) Dopamine", "D) Insulin"], "correct": 1, "hint": "CGRP هو ببتيد يفرز أثناء الصداع ويوسع الأوعية ويسبب الألم."}, {"q": "Sumatriptan should not be taken within 24 hours of Ergotamine because:", "options": ["A) They cancel each other out", "B) Synergistic prolonged vasoconstriction can cause severe ischemia", "C) It causes immediate coma", "D) It dissolves the stomach lining"], "correct": 1, "hint": "الجمع بين قابضين قويين للأوعية قد يسبب نقص تروية خطير (Ischemia)."}, {"q": "A patient with uncontrolled hypertension should avoid which migraine medication?", "options": ["A) Acetaminophen", "B) Triptans and Ergotamine", "C) Propranolol", "D) Aspirin"], "correct": 1, "hint": "لأنها ترفع ضغط الدم بسبب انقباض الأوعية الدموية الشامل."}, {"q": "Which prophylactic migraine drug has a known side effect of weight loss and cognitive dulling?", "options": ["A) Valproic acid", "B) Topiramate", "C) Propranolol", "D) Verapamil"], "correct": 1, "hint": "التوبيراميت يسبب النحافة وضعف التركيز (يُسمى أحياناً Dopamax كدعابة)."}, {"q": "Valproic acid is effective for migraine prophylaxis but is strictly avoided in:", "options": ["A) Men", "B) Pregnant women (due to teratogenicity)", "C) Children over 12", "D) Asthma patients"], "correct": 1, "hint": "الفالبروات يسبب تشوهات خلقية خطيرة (الشق الشوكي)."}, {"q": "Verapamil is preferred for migraine prophylaxis in patients who also suffer from:", "options": ["A) Hypertension or Angina", "B) Hypotension", "C) Liver failure", "D) Asthma only"], "correct": 0, "hint": "لأنه خافض للضغط وموسع لشرايين القلب، فيعالج الحالتين معاً."}, {"q": "Which of the following describes a 'migraine without aura'?", "options": ["A) Classic migraine", "B) Common migraine", "C) Cluster headache", "D) Tension headache"], "correct": 1, "hint": "الصداع الشائع (Common) يأتي بدون زغللة، بينما الكلاسيكي يأتي بأورا."}, {"q": "Botulinum toxin (Botox) injections are an FDA-approved prophylaxis for:", "options": ["A) Mild headaches", "B) Chronic migraines (≥15 days/month)", "C) Acute gout", "D) Seizures"], "correct": 1, "hint": "يستخدم حقن البوتوكس للحالات المزمنة جداً لإرخاء عضلات الرأس ومنع الألم."}, {"q": "A major side effect of Ergotamine toxicity (Ergotism) is:", "options": ["A) Severe vasospasm leading to gangrene of extremities", "B) Excessive hair growth", "C) Hyperthermia", "D) Miosis"], "correct": 0, "hint": "التسمم بالإرجوت يقبض الأطراف لدرجة منع الدم تماماً، مما قد يسبب غرغرينا."}, {"q": "The primary analgesic properties of opioids are mediated by which receptor?", "options": ["A) Kappa", "B) Delta", "C) Mu (μ)", "D) Sigma"], "correct": 2, "hint": "مستقبلات الميو (Mu) هي الأساس في تسكين الألم القوي، والنشوة، وتثبيط التنفس."}, {"q": "Opioids inhibit neurotransmitter release presynaptically by decreasing the influx of:", "options": ["A) Sodium", "B) Calcium (Ca2+)", "C) Chloride", "D) Potassium"], "correct": 1, "hint": "غلق قنوات الكالسيوم يمنع الحويصلات من إ             const currentQ = questionsData[currentQuestionIndex];
            progressText.innerText = `السؤال ${currentQuestionIndex + 1} من ${questionsData.length}`;
            questionTextElement.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.q}`;
            
            hintBox.innerHTML = `<strong>💡 تلميح:</strong> ${currentQ.hint}`;

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn, currentQ.correct);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, btnElement, correctIndex) {
            if (answered) return;
            answered = true;
            
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);
            
            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }
            
            hintBtn.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function showHint() {
            hintBox.style.display = 'block';
            hintBtn.style.display = 'none';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizBox.style.display = 'none';
            resultBox.style.display = 'block';
            scoreText.innerText = score;
        }

        loadQuestion();
    </script>
</body>
</html>
