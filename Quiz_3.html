ical antipsychotic is notably used for Autism irritability?", "options": ["A) Risperidone", "B) Haloperidol", "C) Thioridazine", "D) Clozapine"], "correct": 0, "hint": "يقلل العدوانية والتهيج في الأطفال المصابين بالتوحد."}, {"q": "A 'drug holiday' may be attempted to diminish the symptoms of:", "options": ["A) Acute Dystonia", "B) Tardive Dyskinesia", "C) Akathisia", "D) NMS"], "correct": 1, "hint": "يعطي الدماغ فرصة للتخلص من المستقبلات الزائدة."}, {"q": "Akathisia presents as:", "options": ["A) Twisting neck", "B) Severe motor restlessness and pacing", "C) Lip smacking", "D) Muscular weakness"], "correct": 1, "hint": "شعور داخلي بعدم الراحة يجبر المريض على المشي باستمرار."}, {"q": "If Levodopa is given with a neuroleptic, it will:", "options": ["A) Cure Parkinson's", "B) Be blocked and render useless", "C) Cause sleep", "D) Stop dystonia"], "correct": 1, "hint": "لأن المستقبلات مغلقة أصلاً بالدواء المضاد للذهان."}, {"q": "Which drug is a Low-potency typical antipsychotic?", "options": ["A) Haloperidol", "B) Chlorpromazine", "C) Fluphenazine", "D) Risperidone"], "correct": 1, "hint": "يحتاج لجرعات أعلى ويسبب نعاساً شديداً."}, {"q": "Clozapine's minimal EPS is partly due to its high affinity for:", "options": ["A) D1", "B) D4", "C) H1", "D) Alpha-1"], "correct": 1, "hint": "يعمل بشكل مختلف عن باقي الأدوية."}, {"q": "In Simple Partial seizures, the patient:", "options": ["A) Loses consciousness", "B) Does NOT lose consciousness", "C) Has absence spells", "D) Enters a coma"], "correct": 1, "hint": "المريض يكون واعياً تماماً بما يحدث لجسده."}, {"q": "Absence (Petit mal) seizures are characterized by:", "options": ["A) Violent convulsions", "B) Brief loss of consciousness where the patient 'stares'", "C) High fever", "D) Auras"], "correct": 1, "hint": "نوبات التغيب تستمر لثوانٍ معدودة."}, {"q": "Status Epilepticus is a medical emergency because it involves:", "options": ["A) A single absence seizure", "B) Continuous seizures without recovery", "C) Febrile seizures", "D) Migraines"], "correct": 1, "hint": "عاصفة كهربائية لا تتوقف، تتطلب تدخلاً فورياً."}, {"q": "Phenytoin and Carbamazepine exert their antiepileptic effect primarily by blocking:", "options": ["A) Calcium channels", "B) Voltage-gated Sodium (Na+) channels", "C) GABA receptors", "D) Glutamate receptors"], "correct": 1, "hint": "يمنع إطلاق الإشارات الكهربائية المتتالية."}, {"q": "Ethosuximide is highly effective for Absence seizures because it blocks:", "options": ["A) Na+ channels", "B) T-type Calcium (Ca++) channels in the thalamus", "C) Potassium channels", "D) Chloride channels"], "correct": 1, "hint": "نوبات التغيب تعتمد حصرياً على تيارات الكالسيوم."}, {"q": "What is the most dangerous consequence of abruptly stopping AEDs?", "options": ["A) Hair loss", "B) Precipitation of Status Epilepticus", "C) Weight gain", "D) Gingival hyperplasia"], "correct": 1, "hint": "التوقيف المفاجئ يدخل الدماغ في تشنجات مستمرة مميتة."}, {"q": "Carbamazepine is known as an 'Enzyme Inducer'. This means it:", "options": ["A) Decreases the half-life of itself and other drugs", "B) Causes liver failure directly", "C) Increases levels of other drugs", "D) Stops metabolism"], "correct": 0, "hint": "يسرع تكسير نفسه والأدوية الأخرى."}, {"q": "Which AED is a strong Hepatic Enzyme INHIBITOR?", "options": ["A) Phenytoin", "B) Carbamazepine", "C) Valproic Acid", "D) Phenobarbital"], "correct": 2, "hint": "المثبط الوحيد المهم هنا، يرفع مستويات الأدوية الأخرى."}, {"q": "Valproic acid displaces Phenytoin from plasma proteins, causing:", "options": ["A) Phenytoin to stop working", "B) Increased 'free' Phenytoin in blood, leading to toxicity", "C) Excretion of Phenytoin", "D) Nothing"], "correct": 1, "hint": "يصبح الفينيتوين حراً ونشطاً بتركيزات سامة."}, {"q": "Valproic acid is heavily associated with causing which fetal defect?", "options": ["A) Cleft lip", "B) Spina Bifida", "C) Heart defects", "D) Cataracts"], "correct": 1, "hint": "التشوه الأشهر والأخطر في الأجنة (الشق الشوكي)."}, {"q": "A common cosmetic side effect of Phenytoin requiring excellent dental hygiene is:", "options": ["A) Tooth decay", "B) Gingival hyperplasia", "C) Cleft palate", "D) Oral thrush"], "correct": 1, "hint": "تضخم اللثة يصيب عدداً كبيراً من الأطفال."}, {"q": "Phenytoin exhibits 'Zero-Order Kinetics' at higher doses, meaning:", "options": ["A) It is instantly excreted", "B) Small dose increments cause massive plasma level increases", "C) It stops working", "D) It cures the disease"], "correct": 1, "hint": "الإنزيمات تتشبع بسرعة وتتراكم الجرعة."}, {"q": "Topiramate inhibits Carbonic Anhydrase, increasing the risk of:", "options": ["A) Liver failure", "B) Weight gain", "C) Renal stones", "D) Hair loss"], "correct": 2, "hint": "حصوات الكلى وفقدان الوزن من أشهر أعراضه."}, {"q": "Phenobarbital acts primarily by:", "options": ["A) Blocking Na+ channels directly", "B) Increasing the DURATION of chloride channel opening", "C) Inhibiting Carbonic Anhydrase", "D) Decreasing GABA"], "correct": 1, "hint": "يسمح بدخول كمية هائلة من الشحنات السالبة لتخدير الدماغ."}, {"q": "Primidone relies heavily on the liver converting it into:", "options": ["A) Phenytoin", "B) Phenobarbital and PEMA", "C) Carbamazepine", "D) Valproic acid"], "correct": 1, "hint": "يتحول في الكبد ليعمل كمسكن قوي للصرع."}, {"q": "Tiagabine specifically blocks GABA reuptake via:", "options": ["A) GAT-1 transporter", "B) SV2A", "C) NMDA receptor", "D) AMPA receptor"], "correct": 0, "hint": "يمنع الشفاط من سحب الجابة من التشابك العصبي."}, {"q": "Levetiracetam binds to which unique target?", "options": ["A) Na+ channels", "B) SV2A synaptic vesicle protein", "C) GABA-A receptors", "D) NMDA receptors"], "correct": 1, "hint": "يمنع انطلاق النواقل العصبية المحفزة بميكانيزم فريد."}, {"q": "Felbamate is a 'last resort' option because it causes:", "options": ["A) Severe gingival hyperplasia", "B) Fatal Aplastic Anemia and Hepatic Failure", "C) Expensive", "D) Immediate weight gain"], "correct": 1, "hint": "يدمر نخاع العظم والكبد."}, {"q": "Ethosuximide is NOT bound to plasma proteins. The advantage is:", "options": ["A) Zero risk of displacement interactions with drugs like Aspirin", "B) Destroys stomach acid", "C) Works instantly", "D) Cures epilepsy"], "correct": 0, "hint": "آمن من التداخلات الدوائية الإزاحية."}, {"q": "Why is Phenytoin NEVER administered intramuscularly (IM)?", "options": ["A) Highly volatile", "B) Causes severe tissue necrosis and crystallization in the muscle", "C) Works too fast", "D) Destroyed by muscle enzymes"], "correct": 1, "hint": "يسبب ألماً شديداً وموت الأنسجة."}, {"q": "Ataxia, nystagmus, and double vision with Phenytoin indicate:", "options": ["A) Cerebello-Vestibular toxicity", "B) Impending stroke", "C) Simple partial seizure", "D) Gingival hyperplasia"], "correct": 0, "hint": "أعراض تسمم المخيخ وتحتاج لتقليل الجرعة."}, {"q": "Pregabalin and Gabapentin actually work by blocking:", "options": ["A) Direct GABA receptors", "B) Voltage-gated Calcium channels", "C) Sodium channels", "D) Glutamate synthesis"], "correct": 1, "hint": "يمنعان إفراز النواقل المحفزة من العصب."}, {"q": "Pregabalin is a premier treatment for:", "options": ["A) Absence seizures", "B) Neuropathic pain (e.g., Diabetic neuropathy)", "C) Schizophrenia", "D) Gout"], "correct": 1, "hint": "مسكن فعال جداً لآلام الأعصاب."}, {"q": "Zonisamide's main chemical contraindication is allergy to:", "options": ["A) Penicillin", "B) Sulfonamides", "C) Aspirin", "D) Peanuts"], "correct": 1, "hint": "يسبب صدمة تحسسية لمرضى حساسية السلفا."}, {"q": "What is the primary rationale for starting Epilepsy treatment with Monotherapy?", "options": ["A) Cures instantly", "B) Minimizes severe adverse effects and identifies exactly which drug is working", "C) Polytherapy is illegal", "D) Cheaper"], "correct": 1, "hint": "يحمي المريض من المضاعفات الإدراكية."}, {"q": "If Carbamazepine is taken chronically, its half-life decreases over time due to:", "options": ["A) Tachyphylaxis", "B) Auto-induction of hepatic P450 enzymes", "C) Zero-order saturation", "D) Renal excretion"], "correct": 1, "hint": "يحفز الكبد لتكسير نفسه!"}, {"q": "Topiramate can induce 'Oligohydrosis', predisposing children to:", "options": ["A) Severe dehydration", "B) Hyperthermia (heat stroke) due to inability to sweat", "C) Kidney failure", "D) Frostbite"], "correct": 1, "hint": "انقطاع العرق يعرض الأطفال لضربات شمس قاتلة."}, {"q": "Which AED is famously associated with causing temporary hair loss (Alopecia)?", "options": ["A) Topiramate", "B) Phenytoin", "C) Valproic Acid", "D) Gabapentin"], "correct": 2, "hint": "الفالبروات يسبب مشاكل تجميلية مزعجة للمرضى."}, {"q": "Oxcarbazepine is preferred over Carbamazepine because it has a lower risk of:", "options": ["A) Sedation", "B) Aplastic anemia and hepatic toxicity", "C) Hyponatremia", "D) Seizures"], "correct": 1, "hint": "يتجنب الـ Epoxide السام."}, {"q": "Carbamazepine is strictly NOT used in:", "options": ["A) Adults", "B) Absence seizures", "C) Men", "D) Status epilepticus"], "correct": 1, "hint": "تفاقم نوبات التغيب وتزيدها سوءاً."}, {"q": "The active epoxide metabolite of Carbamazepine is associated with:", "options": ["A) Aplastic anemia", "B) Gingival hyperplasia", "C) Hair loss", "D) Blindness"], "correct": 0, "hint": "يدمر نخاع العظم."}, {"q": "Valproic Acid is a broad-spectrum AED because it blocks Na+, Ca++, and:", "options": ["A) Decreases GABA", "B) Increases GABA levels", "C) Blocks K+ channels", "D) Induces liver enzymes"], "correct": 1, "hint": "يعمل بآليات متعددة ليقضي على جميع أنواع الصرع."}, {"q": "Diazepam is administered IV as the emergency drug of choice for:", "options": ["A) Migraines", "B) Status Epilepticus", "C) Absence seizures", "D) Gout"], "correct": 1, "hint": "حقنة الوريد توقف التشنج المستمر في ثوانٍ."}, {"q": "A common adverse effect of almost all AEDs, which can cause academic struggles in children, is:", "options": ["A) Osteoporosis", "B) Drowsiness / Sedation", "C) Rash", "D) Hyponatremia"], "correct": 1, "hint": "مثبطات للجهاز العصبي المركزي تسبب الخمول."}, {"q": "Which of the following AEDs is excreted 100% unchanged by the kidneys?", "options": ["A) Valproic Acid", "B) Gabapentin", "C) Phenytoin", "D) Carbamazepine"], "correct": 1, "hint": "آمن جداً للإضافة لأدوية أخرى لأنه لا يمر بالكبد."}];
        
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const hintBox = document.getElementById('hint-box');
        const nextBtn = document.getElementById('next-btn');
        const hintBtn = document.getElementById('hint-btn');
        const progressText = document.getElementById('progress-text');
        const quizBox = document.getElementById('quiz-box');
        const resultBox = document.getElementById('result-box');
        const scoreText = document.getElementById('score-text');

        function loadQuestion() {
            answered = false;
            hintBox.style.display = 'none';
            nextBtn.style.display = 'none';
            hintBtn.style.display = 'none';
            optionsContainer.innerHTML = '';
            
            const currentQ = questionsData[currentQuestionIndex];
            progressText.innerText = `السؤال ${currentQuestionIndex + 1} من ${questionsData.length}`;
            questionTextElement.innerText = `Q${currentQuestionIndex + 1}: ${currentQ.q}`;
            
            hintBox.innerHTML = `<strong>💡 تلميح:</strong> ${currentQ.hint}`;

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn, currentQ.correct);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, btnElement, correctIndex) {
            if (answered) return;
            answered = true;
            
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);
            
            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }
            
            hintBtn.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function showHint() {
            hintBox.style.display = 'block';
            hintBtn.style.display = 'none';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizBox.style.display = 'none';
            resultBox.style.display = 'block';
            scoreText.innerText = score;
        }

        // بدء الاختبار
        loadQuestion();
    </script>
