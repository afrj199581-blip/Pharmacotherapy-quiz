    const data = [{"q": "The primary cause of death in acute opioid overdose is:", "options": ["A) Heart failure", "B) Respiratory depression", "C) Severe constipation", "D) Seizures"], "correct": 1, "hint": "الأفيونات تقلل استجابة مركز التنفس لثاني أكسيد الكربون."}, {"q": "A classic diagnostic sign of Morphine overdose to which NO tolerance develops is:", "options": ["A) Mydriasis", "B) Miosis (pinpoint pupils)", "C) Tachycardia", "D) Hyperthermia"], "correct": 1, "hint": "الحدقة الدبوسية والإمساك لا يعتاد الجسم عليهما أبداً."}, {"q": "Why is Morphine contraindicated in severe bronchial asthma?", "options": ["A) It blocks Beta-2 receptors", "B) It causes Histamine release leading to bronchoconstriction", "C) It causes pulmonary edema", "D) It paralyzes the diaphragm"], "correct": 1, "hint": "المورفين يفرز الهيستامين من الخلايا الصارية (Mast cells) مما يخنق مريض الربو."}, {"q": "Morphine causes vomiting by directly stimulating the:", "options": ["A) Enteric nervous system", "B) Vestibular apparatus", "C) Chemoreceptor Trigger Zone (CTZ)", "D) Vagus nerve"], "correct": 2, "hint": "يحفز مركز القيء في الدماغ (CTZ) مباشرة."}, {"q": "Morphine is contraindicated in biliary colic because it:", "options": ["A) Dissolves gallstones", "B) Increases biliary tract pressure via sphincter of Oddi constriction", "C) Causes gallbladder rupture", "D) Stops bile flow completely"], "correct": 1, "hint": "يقبض صمام أودي بقوة مما يضاعف ألم المغص المراري."}, {"q": "Which synthetic opioid has anticholinergic activity, causing pupil DILATION instead of miosis?", "options": ["A) Morphine", "B) Fentanyl", "C) Meperidine (Pethidine)", "D) Methadone"], "correct": 2, "hint": "الميبيريدين هو الاستثناء الوحيد في عائلة الأفيونات؛ يوسع الحدقة."}, {"q": "Meperidine is preferred over morphine in labor because it:", "options": ["A) Is safe for the fetus", "B) Has significantly less effect on prolonging uterine contractions", "C) Prevents hemorrhage", "D) Is a pure antagonist"], "correct": 1, "hint": "لا يعطل انقباضات الرحم بشكل كبير مثل المورفين."}, {"q": "High doses of Meperidine can cause severe convulsions due to the accumulation of:", "options": ["A) Normeperidine", "B) Morphine", "C) Acetylcholine", "D) Histamine"], "correct": 0, "hint": "الميتابوليت السام 'نورميبيريدين' يثير الجهاز العصبي المركزي."}, {"q": "A fatal Serotonin Syndrome occurs when Meperidine is combined with:", "options": ["A) NSAIDs", "B) Monoamine Oxidase Inhibitors (MAOIs)", "C) Beta-blockers", "D) Calcium channel blockers"], "correct": 1, "hint": "مزيج قاتل يرفع حرارة الجسم لدرجات مميتة."}, {"q": "Methadone is the drug of choice for heroin detoxification because:", "options": ["A) It is a pure antagonist", "B) It causes a milder, protracted withdrawal syndrome due to its long half-life", "C) It is not addictive", "D) It cures the receptors"], "correct": 1, "hint": "مفعوله طويل جداً، فيسحب الهيروين من الجسم ببطء."}, {"q": "Fentanyl is heavily used in cardiac surgery because it:", "options": ["A) Lasts for 24 hours", "B) Maintains stable hemodynamics without affecting contractility", "C) Causes hypotension", "D) Is a partial agonist"], "correct": 1, "hint": "لا يؤثر على عضلة القلب ولا يفرز هيستامين."}, {"q": "A Fentanyl transdermal patch is contraindicated in:", "options": ["A) Chronic cancer pain", "B) Acute or post-operative pain in opioid-naive patients", "C) Palliative care", "D) Severe back pain"], "correct": 1, "hint": "مخصصة فقط لمن لديهم مناعة (Tolerance) للأفيون."}, {"q": "Codeine's analgesic effect is lower than morphine's because it must first be converted into:", "options": ["A) Norcodeine", "B) Heroin", "C) Morphine (via CYP2D6)", "D) Dextromethorphan"], "correct": 2, "hint": "الكودايين هو Prodrug يحتاج لإنزيمات الكبد ليتحول إلى مورفين."}, {"q": "Dextromethorphan has replaced Codeine in cough syrups because it:", "options": ["A) Is 10x more potent", "B) Has no analgesic action and low abuse potential", "C) Cures viral infections", "D) Induces sleep"], "correct": 1, "hint": "فعال جداً في تثبيط السعال دون تسكين أو إدمان."}, {"q": "If Pentazocine (mixed agonist-antagonist) is given to a Heroin addict, what will occur?", "options": ["A) Immediate pain relief", "B) Enhanced euphoria", "C) Precipitation of severe withdrawal symptoms", "D) Respiratory arrest"], "correct": 2, "hint": "سيطرد الهيروين ويعمل كمضاد، مما يدخل المدمن في صدمة انسحاب."}, {"q": "Tramadol provides analgesia via weak Mu receptor binding and primarily by:", "options": ["A) Releasing dopamine", "B) Inhibiting the reuptake of norepinephrine and serotonin", "C) Blocking sodium channels", "D) Antagonizing GABA"], "correct": 1, "hint": "يجمع بين كونه مسكناً أفيونياً ومضاداً للاكتئاب."}, {"q": "Which drug is a pure competitive antagonist administered IV to rapidly reverse opioid coma?", "options": ["A) Naltrexone", "B) Naloxone", "C) Buprenorphine", "D) Methadone"], "correct": 1, "hint": "النالوكزون (Narcan) هو حقنة الإنقاذ في الطوارئ وتعمل فوراً."}, {"q": "What is a critical limitation of Naloxone when treating an overdose?", "options": ["A) Causes fatal arrhythmias", "B) Its duration of action is short (1-2 hours), risking relapse into coma", "C) Only works on synthetic opioids", "D) Requires oral dosing"], "correct": 1, "hint": "يختفي من الجسم قبل أن يختفي الأفيون طويل المفعول."}, {"q": "Tolerance develops to the respiratory depressant effects of morphine, but NEVER develops to:", "options": ["A) Sedation and Nausea", "B) Miosis and Constipation", "C) Vasodilation", "D) Antitussive effects"], "correct": 1, "hint": "الإمساك وضيق الحدقة تظل مستمرة مهما طالت مدة الإدمان."}, {"q": "Opioids cause hyperpolarization and inhibit nerve firing postsynaptically by increasing the efflux of:", "options": ["A) Calcium", "B) Potassium (K+)", "C) Sodium", "D) Magnesium"], "correct": 1, "hint": "خروج البوتاسيوم الموجب يترك الخلية سالبة جداً."}, {"q": "Presynaptically, opioids inhibit the release of excitatory neurotransmitters by decreasing the influx of:", "options": ["A) Sodium", "B) Potassium", "C) Calcium (Ca2+)", "D) Chloride"], "correct": 2, "hint": "منع دخول الكالسيوم يوقف الحويصلات عن إفراز النواقل."}, {"q": "Which opioid has a unique isomer (Levo) used strictly as an antitussive?", "options": ["A) Propoxyphene", "B) Methadone", "C) Fentanyl", "D) Meperidine"], "correct": 0, "hint": "إيزومر الـ Levo يعمل كمضاد للسعال فقط."}, {"q": "Partial agonists like Buprenorphine are safer regarding respiratory depression due to their:", "options": ["A) Total lack of Mu binding", "B) Ceiling effect", "C) Short half-life", "D) Rapid excretion"], "correct": 1, "hint": "لها 'سقف' لا تتجاوزه مهما زادت الجرعة."}, {"q": "Naltrexone is preferred over Naloxone for maintenance therapy because it is:", "options": ["A) Injectable only", "B) Orally active with a long duration of action (48 hours)", "C) A full agonist", "D) Cheaper"], "correct": 1, "hint": "يستخدم كحبة يومية لمنع الانتكاسة."}, {"q": "Which opioid can precipitate seizures when combined with SSRIs?", "options": ["A) Morphine", "B) Codeine", "C) Tramadol", "D) Fentanyl"], "correct": 2, "hint": "بسبب خطر 'متلازمة السيروتونين'."}, {"q": "Opioid withdrawal is characterized by:", "options": ["A) Miosis and constipation", "B) Mydriasis, diarrhea, and severe autonomic hyperactivity", "C) Coma", "D) Hypoventilation"], "correct": 1, "hint": "أعراض الانسحاب دائماً عكس تأثير الدواء."}, {"q": "Opioids inhibit GnRH, leading to:", "options": ["A) Increased testosterone", "B) Decreased testosterone and libido", "C) Increased fertility", "D) Hyperglycemia"], "correct": 1, "hint": "تسبب ضعفاً جنسياً وعقماً بسبب التثبيط الهرموني."}, {"q": "Which patient group is highly sensitive to standard opioid doses?", "options": ["A) Hypertensives", "B) Hypothyroidism (Myxedema) patients", "C) Diabetics", "D) Asthmatics (for reasons other than histamine)"], "correct": 1, "hint": "بسبب بطء الأيض، الدواء يتراكم بقوة."}, {"q": "The primary driving force that compels a late-stage addict to seek opioids is:", "options": ["A) The initial high  "يسبب إفراز الحليب والعقم."}, {"q": "Orthostatic hypotension associated with neuroleptics is caused by the blockade of:", "options": ["A) D2 receptors", "B) H1 receptors", "C) Alpha-adrenergic receptors", "D) Muscarinic receptors"], "correct": 2, "hint": "يمنع الأوعية من الانقباض عند الوقوف."}, {"q": "Poikilothermia occurs with neuroleptics because they depress the:", "options": ["A) Thyroid", "B) Hypothalamus", "C) Pituitary", "D) Adrenal medulla"], "correct": 1, "hint": "يتأثر المريض بحرارة الغرفة بسبب تعطل الترموستات."}, {"q": "Acute Dystonia and Parkinson-like EPS are treated using:", "options": ["A) Levodopa", "B) Anticholinergic drugs (e.g., Benztropine)", "C) Diazepam", "D) Naloxone"], "correct": 1, "hint": "البنزتروبين يعيد توازن الأسيتيل كولين."}, {"q": "Tardive Dyskinesia is a late-onset motor disorder caused by:", "options": ["A) Dopamine deficiency", "B) Dopamine receptor up-regulation (supersensitivity)", "C) Acetylcholine excess", "D) Liver failure"], "correct": 1, "hint": "المخ يصنع مستقبلات جديدة حساسة جداً للدوبامين."}, {"q": "A fatal reaction characterized by 'lead-pipe' muscle rigidity and hyperthermia is called:", "options": ["A) Tardive Dyskinesia", "B) Neuroleptic Malignant Syndrome (NMS)", "C) Serotonin Syndrome", "D) Status Epilepticus"], "correct": 1, "hint": "متلازمة خبيثة وقاتلة تتطلب العناية المركزة."}, {"q": "Treatment for Neuroleptic Malignant Syndrome (NMS) includes:", "options": ["A) Epinephrine", "B) Dantrolene or Bromocriptine", "C) Benztropine", "D) Naloxone"], "correct": 1, "hint": "الدانترولين لترخية العضلات، والبروموكريبتين كمنشط للدوبامين."}, {"q": "Clozapine requires strict blood monitoring due to a risk of:", "options": ["A) Fatal Agranulocytosis", "B) Aplastic Anemia", "C) Renal failure", "D) Cardiac rupture"], "correct": 0, "hint": "قد يمسح كرات الدم البيضاء تماماً."}, {"q": "Weight gain and metabolic syndrome are most problematically associated with:", "options": ["A) Typical neuroleptics", "B) Atypical neuroleptics (e.g., Olanzapine, Clozapine)", "C) NSAIDs", "D) Antiepileptics"], "correct": 1, "hint": "رغم أمانها الحركي، الأدوية الحديثة تسبب سمنة مفرطة."}, {"q": "Ziprasidone is strictly contraindicated in patients with a history of:", "options": ["A) Asthma", "B) Cardiac arrhythmias (QT prolongation)", "C) Liver failure", "D) Seizures"], "correct": 1, "hint": "قد يدخل المريض في رفرفة بطينية مميتة."}, {"q": "If an elderly patient has BPH, which typical antipsychotic MUST be avoided due to strong antimuscarinic effects?", "options": ["A) Haloperidol", "B) Thioridazine", "C) Fluphenazine", "D) Pimozide"], "correct": 1, "hint": "يسبب احتباساً بولياً حاداً."}, {"q": "Haloperidol produces EPS very frequently because it has very low:", "options": ["A) D2 affinity", "B) Anticholinergic activity", "C) Serotonin affinity", "D) Absorption"], "correct": 1, "hint": "لأنه لا يغلق الأسيتيل كولين، يختل الميزان بشدة."}, {"q": "Thioridazine shows FEWER EPS because it:", "options": ["A) Doesn't cross the BBB", "B) Strongly blocks cholinergic activity", "C) Increases dopamine", "D) Blocks serotonin only"], "correct": 1, "hint": "يغلق الأسيتيل كولين فيعيد التوازن الحركي."}, {"q": "Aripiprazole has a uniquely low potential for causing EPS and prolactin elevation because it is a:", "options": ["A) Pure antagonist", "B) Partial dopamine agonist", "C) Serotonin agonist", "D) Cholinergic blocker"], "correct": 1, "hint": "يحافظ على مستوى متوازن من الدوبامين."}, {"q": "Antipsychotics are effective antiemetics because they block D2 receptors in the:", "options": ["A) Stomach", "B) Vestibular apparatus", "C) Chemoreceptor Trigger Zone (CTZ)", "D) Cerebellum"], "correct": 2, "hint": "يوقف القيء الكيميائي بفعالية شديدة."}, {"q": "Why are neuroleptics NOT used for motion sickness?", "options": ["A) They cause vomiting", "B) Motion sickness is mediated by vestibular cholinergic pathways", "C) They don't cross the BBB", "D) They cause seizures"], "correct": 1, "hint": "دوار البحر يحتاج لمضادات هيستامين أو كولين."}, {"q": "Sedation from antipsychotics is mostly due to the potent blockade of:", "options": ["A) D2 receptors", "B) H1 histamine receptors", "C) M1 receptors", "D) Alpha-1 receptors"], "correct": 1, "hint": "غلق الهيستامين يسبب النعاس العميق."}, {"q": "Neuroleptics must be used cautiously in epileptics because they:", "options": ["A) Interact with AEDs directly", "B) Lower the seizure threshold", "C) Cause brain bleeding", "D) Increase GABA"], "correct": 1, "hint": "تجعل مريض الصرع عرضة لنوبات أكثر."}, {"q": "Fluphenazine and Haloperidol are available as 'depot' forms for:", "options": ["A) Acute emergencies", "B) Non-compliant patients", "C) Children", "D) Pregnant women"], "correct": 1, "hint": "توفر إطلاقاً بطيئاً يكفي لأسابيع للمرضى الرافضين للعلاج."}, {"q": "In schizophrenia, a 'fixed false belief' is defined as a:", "options": ["A) Hallucination", "B) Delusion", "C) Loose association", "D) Flat affect"], "correct": 1, "hint": "أفكار راسخة لا يمكن إقناع المريض بعكسها."}, {"q": "Shifting completely from one unrelated thought to another is known as:", "options": ["A) Delusion", "B) Hallucination", "C) Loose associations", "D) Anhedonia"], "correct": 2, "hint": "جمل غير مترابطة تعكس اضطراب شكل الفكرة."}, {"q": "Promethazine is primarily used clinically to treat:", "options": ["A) Schizophrenia", "B) Pruritus (itching) and allergies", "C) Heart failure", "D) Constipation"], "correct": 1, "hint": "مضاد حساسيه قوي وليس للذهان."}, {"q": "Which atypical antipsychotic is frequently utilized for Bipolar Depression?", "options": ["A) Quetiapine", "B) Haloperidol", "C) Fluphenazine", "D) Thioridazine"], "correct": 0, "hint": "الأدوية الحديثة تعمل كمثبتات للمزاج ممتاز."}, {"q": "Are neuroleptic drugs curative for schizophrenia?", "options": ["A) Yes", "B) No, they only manage symptoms", "C) Only in early stages", "D) They cure negative symptoms only"], "correct": 1, "hint": "الأدوية تهدي الأعراض لتسمح بالاندماج، لكنها لا تعالج الخلل الأساسي."}, {"q": "Which atypical antipsyc
