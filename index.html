<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Hospital Tools</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .btn { display: block; background: #2563eb; color: white; padding: 15px; margin: 10px auto; border-radius: 10px; text-decoration: none; max-width: 300px; font-weight: bold; }
        .sub-menu { display: none; margin-top: 20px; }
        .back-btn { background: #64748b; }
    </style>
</head>
<body>

<h1>القائمة الرئيسية</h1>

<div id="main-menu">
    <button class="btn" onclick="show('solved-menu')">أسئلة محلولة</button>
    <button class="btn" onclick="show('quiz-menu')">Phototherapy Quiz</button>
</div>

<div id="solved-menu" class="sub-menu">
    <button class="btn back-btn" onclick="hide()">رجوع</button>
    <a href="q1.pdf" class="btn">السؤال 1</a>
    <a href="q2.pdf" class="btn">السؤال 2</a>
    <a href="q3.pdf" class="btn">السؤال 3</a>
    <a href="q4.pdf" class="btn">السؤال 4</a>
    <a href="q5.pdf" class="btn">السؤال 5</a>
    <a href="q6.pdf" class="btn">السؤال 6</a>
    <a href="q7.pdf" class="btn">السؤال 7</a>
    <a href="q8.pdf" class="btn">السؤال 8</a>
    <a href="q9.pdf" class="btn">السؤال 9</a>
    <a href="q10.pdf" class="btn">السؤال 10</a>
    <a href="q11.pdf" class="btn">السؤال 11</a>
</div>

<div id="quiz-menu" class="sub-menu">
    <button class="btn back-btn" onclick="hide()">رجوع</button>
    <a href="Quiz_1.html" class="btn">Quiz 1</a>
    <a href="Quiz_2.html" class="btn">Quiz 2</a>
    <a href="Quiz_3.html" class="btn">Quiz 3</a>
    <a href="Quiz_Epilepsy.html" class="btn">Epilepsy Quiz</a>
    <a href="Quiz_Opioids.html" class="btn">Opioids Quiz</a>
    <a href="Quiz_Neuroleptics.html" class="btn">Neuroleptics Quiz</a>
    <a href="Quiz_NSAIDS.html" class="btn">NSAIDs Quiz</a>
    <a href="Quiz_NSAIDS1.html" class="btn">NSAIDs 1 Quiz</a>
</div>

<script>
    function show(id) { 
        document.getElementById('main-menu').style.display='none'; 
        document.getElementById(id).style.display='block'; 
    }
    function hide() { 
        document.getElementById('main-menu').style.display='block'; 
        document.querySelectorAll('.sub-menu').forEach(e => e.style.display='none'); 
    }
</script>
</body>
</html>
