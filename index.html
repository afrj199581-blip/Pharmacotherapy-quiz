<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>Hospital Tools</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .btn { display: block; background-color: #1e3a8a; color: white; padding: 20px; margin: 15px auto; font-size: 18px; font-weight: bold; border-radius: 12px; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.3s; width: 80%; max-width: 400px; }
        .btn:hover { background-color: #152b69; }
        .back-btn { background-color: #64748b; }
        .sub-menu { display: none; }
    </style>
</head>
<body>

<script>
    function show(id) { document.getElementById('main-menu').style.display='none'; document.getElementById(id).style.display='block'; }
    function hide() { document.getElementById('main-menu').style.display='block'; document.querySelectorAll('.sub-menu').forEach(e => e.style.display='none'); }
</script>
